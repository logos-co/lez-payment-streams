[package]
name = "lez_payment_streams-examples"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "generate_idl"
path = "src/bin/generate_idl.rs"

[[bin]]
name = "lez_payment_streams_cli"
path = "src/bin/lez_payment_streams_cli.rs"

[dependencies]
spel-framework = { git = "https://github.com/logos-co/spel.git", tag = "v0.5.0" }
nssa_core = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", tag = "v0.1.2" }
spel = { git = "https://github.com/logos-co/spel.git", tag = "v0.5.0" }
lez-payment-streams-core = { path = "../lez-payment-streams-core" }
serde_json = "1.0"
tokio = { version = "1.28.2", features = ["net", "rt-multi-thread", "sync", "macros"] }
