[package]
name = "spel-framework"
version = "0.5.0"
edition = "2021"
description = "Developer framework for building SPEL programs (like Anchor for Solana)"

[features]
default = []
host = ["dep:lee", "spel-framework-core/host"]

[dependencies]
spel-framework-core = { path = "../spel-framework-core" }
spel-framework-macros = { path = "../spel-framework-macros" }
lee_core = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "62d9ba10f8f86db3a1f04b329a1bd9d5b893bf60", features = ["host"] }
lee = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "62d9ba10f8f86db3a1f04b329a1bd9d5b893bf60", optional = true }
borsh = { version = "1.0", features = ["derive"] }
serde_json = "1"
