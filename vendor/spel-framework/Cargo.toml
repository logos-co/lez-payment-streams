[package]
name = "spel-framework"
version = "0.5.0"
edition = "2021"
description = "Developer framework for building SPEL programs (like Anchor for Solana)"

[features]
default = []
host = ["dep:lee", "spel-framework-core/host"]

[dependencies]
spel-framework-core = { path = "../spel-framework-core" }
spel-framework-macros = { path = "../spel-framework-macros" }
lee = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "a58fbce2ff48c58b7bb5001b1a27e64b9596ee3a", optional = true }
borsh = { version = "1.0", features = ["derive"] }
serde_json = "1"
