[package]
name = "spel-framework-core"
version = "0.5.0"
edition = "2021"
description = "Core types for the SPEL program framework"

[features]
# `decode` is enabled by default for CLI and FFI consumers.
# Guest programs that don't need runtime Borsh account decoding can opt out:
#   spel-framework-core = { ..., default-features = false }
default = ["decode"]
decode = ["dep:base58"]
idl-gen = ["dep:syn", "dep:proc-macro2", "dep:toml"]
host = ["dep:lee", "lee_core/host"]

[dependencies]
lee_core = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "62d9ba10f8f86db3a1f04b329a1bd9d5b893bf60", default-features = false }
borsh = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
bytemuck = "1.16"
risc0-zkvm = { version = "=3.0.5", default-features = false, features = ["std"] }
base58 = { version = "0.2", optional = true }

lee = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "62d9ba10f8f86db3a1f04b329a1bd9d5b893bf60", optional = true }

syn = { version = "2.0", features = ["full", "extra-traits"], optional = true }
proc-macro2 = { version = "1.0", optional = true }
toml = { version = "0.8", optional = true }
