[package]
name = "lez_payment_streams-guest"
version = "0.1.0"
edition = "2021"

[workspace]

[[bin]]
name = "lez_payment_streams"
path = "src/bin/lez_payment_streams.rs"

[dependencies]
spel-framework = { git = "https://github.com/logos-co/spel.git" }
nssa_core = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", rev = "ffcbc15972adbf557939bf3e2852af276422631b" }
risc0-zkvm = { version = "=3.0.5", features = ["std"] }
lez_payment_streams_core = { path = "../../lez_payment_streams_core" }
serde = { version = "1.0", features = ["derive"] }
borsh = "1.5"

