[package]
name = "lez_payment_streams-guest"
version = "0.1.0"
edition = "2021"

[workspace]

[[bin]]
name = "lez_payment_streams"
path = "src/bin/lez_payment_streams.rs"

[dependencies]
spel-framework = { git = "https://github.com/logos-co/spel.git", rev = "767826d2b32943c1e43c7c983c02225fb7a68075" }
nssa_core = { git = "https://github.com/logos-blockchain/logos-execution-zone.git", tag = "v0.2.0-rc3" }
risc0-zkvm = { version = "=3.0.5", features = ["std"] }
lez_payment_streams_core = { path = "../../lez_payment_streams_core" }
serde = { version = "1.0", features = ["derive"] }
borsh = "1.5"
